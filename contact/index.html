<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Andy's Essays</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="../" class="logo">Andy's Essays</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="../">Home</a></li>
                    <li><a href="../essays/">Essays</a></li>
                    <li><a href="../about/">About Me</a></li>
                    <li><a href="./">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="container fade-in" style="max-width: 700px;">
        <h2 class="section-title">Get in Touch</h2>
        <p style="text-align: center; margin-bottom: 40px;">Want to chat about marketing, humanities, or coffee? Drop me a line.</p>
        
        <form id="contact-form">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <textarea id="message" rows="6" placeholder="Your Message" required></textarea>
            <button type="submit" class="btn" style="width: 100%;">Send Message</button>
        </form>
    </section>

    <footer>
        <div class="container"><p>&copy; 2026 Andy's Essays.</p></div>
    </footer>
    <script src="../script.js"></script>
</body>
</html>
